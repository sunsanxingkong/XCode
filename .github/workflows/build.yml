name: Build XCode APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK & NDK
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            2>&1
      - name: Install CMake
        run: |
          CMAKE_VER="4.3.0"
          wget -q "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-linux-x86_64.tar.gz" -O /tmp/cmake.tar.gz
          tar -xzf /tmp/cmake.tar.gz -C /opt/
          mkdir -p $ANDROID_SDK_ROOT/cmake
          ln -sf /opt/cmake-${CMAKE_VER}-linux-x86_64 $ANDROID_SDK_ROOT/cmake/4.3.0
          echo "cmake.dir=/opt/cmake-${CMAKE_VER}-linux-x86_64" >> local.properties
          echo "$ANDROID_SDK_ROOT/cmake/4.3.0/bin" >> $GITHUB_PATH
          /opt/cmake-${CMAKE_VER}-linux-x86_64/bin/cmake --version
      - name: Grant Permission
        run: chmod +x gradlew
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCode-Release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: XCode-Release
      - name: Get Version
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H%M')" >> $GITHUB_OUTPUT
          APP_VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]*"' | tr -d '"')
          echo "version=${APP_VER}" >> $GITHUB_OUTPUT
          echo "tag=v$(date +'%Y%m%d.%H%M')" >> $GITHUB_OUTPUT
      - name: Rename APK
        run: |
          find . -name "app-release.apk" -exec mv {} XCode-${{ steps.version.outputs.date }}.apk \;
          ls -la XCode-*.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: XCode v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 XCode v${{ steps.version.outputs.version }}
            > 基于 xiaochenzaine/XCode 的 Android C/C++ IDE 增强版
            > 构建日期: ${{ steps.version.outputs.date }}

            ### ✨ 特性
            - 🖥️ 内置完整 Ubuntu 24.04 终端环境
            - 📝 强大的代码编辑器（语法高亮、代码补全）
            - 🔧 集成 CMake 工具链管理
            - 📦 支持多版本 NDK 安装管理（R25-R29）
            - ⚡ AI 内置 **12 个工具**：文件读写、搜索、重命名、项目概览、终端、网页访问、文件下载
            - ✍️ 你说“写个XX”AI 直接调用工具实时修改文件，绝对服从
            - 💬 对话历史自动保存，重启不丢失
            - 🔍 新增 search_files、grep_files、rename_file、get_project_info、run_command
            - 🧩 插件扩展系统

            ### 📥 安装
            1. 下载 APK
            2. 允许「安装未知应用」权限
            3. 首次启动自动下载 Ubuntu 基础环境（约 300MB）

            ### ⚙️ 要求
            - Android 8.0+（API 26+）
            - arm64-v8a 架构
            - 充足存储空间（建议 2GB+）
          files: XCode-*.apk
          draft: false
          prerelease: false
